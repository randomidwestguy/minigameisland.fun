<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jellyfish Adventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #000814;
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Nunito', system-ui, -apple-system, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(ellipse at top, #001d3d 0%, #000814 100%);
  }
  #wrap {
    position: relative;
    width: min(95vw, calc(95vh * 2/3));
    height: min(calc(95vw * 3/2), 95vh);
    max-width: 540px;
  }
  canvas {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
    background: #001d3d;
    display: block;
    border: 4px solid #ff69b4;
    border-radius: 4px;
    box-shadow:
      0 0 0 4px #000,
      0 0 30px rgba(255,105,180,0.4),
      inset 0 0 30px rgba(0,0,0,0.5);
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    text-align: center;
    padding: 18px;
    background: rgba(0, 8, 20, 0.88);
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }
  .overlay h1 {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: clamp(15px, 4.2vw, 28px);
    color: #ff8fab;
    text-shadow:
      2px 0 0 #d63384,
      -2px 0 0 #d63384,
      0 2px 0 #d63384,
      0 -2px 0 #d63384,
      4px 4px 0 #000;
    margin-bottom: 10px;
    line-height: 1.4;
    letter-spacing: 1px;
  }
  .overlay h2 {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: clamp(16px, 4vw, 26px);
    color: #ef233c;
    text-shadow: 3px 3px 0 #000;
    margin-bottom: 18px;
    letter-spacing: 1px;
  }
  .overlay p {
    font-family: 'Nunito', system-ui, sans-serif;
    font-weight: 700;
    font-size: clamp(13px, 2.9vw, 18px);
    margin: 5px 0;
    text-shadow: 2px 2px 0 #000;
    color: #caf0f8;
    line-height: 1.4;
  }
  .overlay .controls {
    margin-top: 6px;
    padding: 10px 14px;
    background: rgba(255, 214, 10, 0.08);
    border: 2px dashed rgba(255, 214, 10, 0.5);
    border-radius: 4px;
  }
  .overlay .controls p {
    font-size: clamp(11px, 2.5vw, 14px) !important;
    color: #ffea7a !important;
    margin: 4px 0 !important;
  }
  .overlay p .key {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 1em;
    background: #ffd60a;
    color: #000;
    padding: 2px 9px;
    border-radius: 4px;
    margin: 0 3px;
    display: inline-block;
    vertical-align: middle;
    letter-spacing: 0;
    text-shadow: none;
  }
  .overlay button {
    font-family: 'Press Start 2P', 'Courier New', monospace;
    padding: 14px 24px;
    font-size: clamp(13px, 2.8vw, 18px);
    background: #ffd60a;
    color: #000;
    border: none;
    cursor: pointer;
    margin-top: 16px;
    letter-spacing: 2px;
    box-shadow:
      0 0 0 3px #fff,
      0 0 0 6px #000,
      6px 6px 0 #000;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .overlay button:hover, .overlay button:active {
    background: #ffea7a;
    transform: translate(3px, 3px);
    box-shadow:
      0 0 0 3px #fff,
      0 0 0 6px #000,
      3px 3px 0 #000;
  }
  .stat-line {
    color: #ffd60a !important;
    font-size: clamp(15px, 3.4vw, 22px) !important;
    margin: 8px 0 !important;
    text-shadow: 2px 2px 0 #000;
    font-weight: 800 !important;
  }
  .mute-btn {
    position: absolute;
    top: -10px;
    right: -10px;
    width: 36px;
    height: 36px;
    background: #ffd60a;
    color: #000;
    border: 3px solid #fff;
    font-size: 18px;
    cursor: pointer;
    z-index: 20;
    box-shadow: 3px 3px 0 #000;
    font-family: 'Press Start 2P', monospace;
    font-weight: bold;
    padding: 0;
    border-radius: 2px;
  }
  .mute-btn:hover { background: #ffea7a; }
  .mute-btn.muted { background: #444; color: #888; }
  .mute-btn.muted::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 4px;
    right: 4px;
    height: 3px;
    background: #ef233c;
    transform: translateY(-50%) rotate(-30deg);
    box-shadow: 0 1px 0 #000;
  }
  /* Leaderboard overlay */
  #leaderboardScreen { justify-content: flex-start; padding-top: 28px; overflow-y: auto; }
  #leaderboardScreen h2 { margin-bottom: 14px; font-size: clamp(14px, 3.5vw, 22px); color: #ff8fab; }
  .lb-table { width: 100%; border-collapse: collapse; margin-top: 4px; }
  .lb-table th {
    font-family: 'Press Start 2P', monospace; font-size: clamp(7px, 1.6vw, 10px);
    color: #ffd60a; padding: 5px 4px; border-bottom: 2px solid #ff69b4;
    text-align: left; letter-spacing: 1px;
  }
  .lb-table th:last-child { text-align: right; }
  .lb-table td {
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: clamp(11px, 2.4vw, 14px); color: #caf0f8;
    padding: 5px 4px; border-bottom: 1px solid rgba(255,105,180,0.2);
  }
  .lb-table td:last-child { text-align: right; color: #ffd60a; }
  .lb-table tr:first-child td { color: #ffd60a; font-size: clamp(12px, 2.6vw, 15px); }
  .lb-table tr:first-child td:first-child::before { content: "🥇 "; }
  .lb-rank { color: #90e0ef !important; font-family: 'Press Start 2P', monospace !important;
    font-size: clamp(7px,1.5vw,9px) !important; }
  .lb-empty { color: #90e0ef; font-family: 'Nunito', sans-serif;
    font-size: clamp(12px,2.6vw,15px); margin-top: 20px; }
  /* Name-entry screen */
  #nameScreen { gap: 12px; }
  #nameScreen h2 { margin-bottom: 4px; }
  #nameScreen p { color: #ffd60a !important; font-size: clamp(12px,2.7vw,16px) !important; }
  #nameInput {
    font-family: 'Press Start 2P', monospace; font-size: clamp(13px,3vw,18px);
    background: #001d3d; color: #fff; border: 3px solid #ff69b4;
    padding: 10px 14px; width: 80%; text-align: center; letter-spacing: 2px;
    box-shadow: 0 0 0 2px #000, 4px 4px 0 #000; outline: none;
    caret-color: #ffd60a; margin-top: 4px;
  }
  #nameInput:focus { border-color: #ffd60a; }
  .skip-link {
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: clamp(11px,2.4vw,14px); color: #90e0ef;
    cursor: pointer; margin-top: 4px; text-decoration: underline;
    background: none; border: none; padding: 0;
  }
  .skip-link:hover { color: #caf0f8; }
  /* ESC hint during gameplay */
  .esc-hint {
    position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%);
    font-family: 'Nunito', sans-serif; font-weight: 700;
    font-size: clamp(9px,2vw,11px); color: rgba(144,224,239,0.55);
    pointer-events: none; white-space: nowrap; text-shadow: 1px 1px 0 #000;
    z-index: 5;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="160" height="240"></canvas>
  <button id="muteBtn" class="mute-btn" aria-label="Toggle sound">♪</button>
  <div class="esc-hint" id="escHint" style="display:none">ESC = main menu</div>

  <!-- START SCREEN -->
  <div id="startScreen" class="overlay active">
    <h1>JELLYFISH<br>ADVENTURES</h1>
    <div class="controls">
      <p>Press <span class="key">C</span> to use your net.</p>
      <p>Eat donuts to survive!</p>
    </div>
    <button id="startBtn">START</button>
    <button id="lbOpenBtn" style="margin-top:8px;background:#001d3d;color:#90e0ef;font-size:clamp(9px,2vw,12px);box-shadow:0 0 0 2px #90e0ef,0 0 0 4px #000,3px 3px 0 #000;padding:8px 16px;">🏆 LEADERBOARD</button>
  </div>

  <!-- GAME OVER → NAME ENTRY SCREEN -->
  <div id="nameScreen" class="overlay">
    <h2>NICE DIVE!</h2>
    <p id="nameDepthLine">Depth: 0m</p>
    <p style="color:#caf0f8 !important;font-size:clamp(12px,2.6vw,15px) !important;margin-top:4px !important">Enter your name:</p>
    <input id="nameInput" maxlength="12" placeholder="NAME" spellcheck="false" autocomplete="off" />
    <button id="nameSaveBtn">SAVE SCORE</button>
    <button class="skip-link" id="nameSkipBtn">skip</button>
  </div>

  <!-- GAME OVER SCREEN (shown after name entry) -->
  <div id="gameOverScreen" class="overlay">
    <h2>GAME OVER</h2>
    <p class="stat-line" id="finalDepth">Depth: 0m</p>
    <p id="bestDepth" style="color:#90e0ef !important">Best: 0m</p>
    <p id="caughtCount" style="color:#90e0ef !important">Jellies caught: 0</p>
    <button id="restartBtn">DIVE AGAIN</button>
    <button id="lbOpenBtn2" style="margin-top:10px;background:#001d3d;color:#90e0ef;font-size:clamp(9px,2vw,12px);box-shadow:0 0 0 2px #90e0ef,0 0 0 4px #000,3px 3px 0 #000;padding:8px 16px;">🏆 LEADERBOARD</button>
  </div>

  <!-- LEADERBOARD SCREEN -->
  <div id="leaderboardScreen" class="overlay">
    <h2>🏆 LEADERBOARD</h2>
    <table class="lb-table" id="lbTable">
      <thead><tr>
        <th>#</th><th>NAME</th><th>CAUGHT</th><th>DEPTH</th>
      </tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
    <p class="lb-empty" id="lbEmpty" style="display:none">No scores yet!<br>Be the first to dive!</p>
    <button id="lbCloseBtn" style="margin-top:16px">BACK</button>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const W = 160, H = 240;

  const C = {
    bgBand0: '#000814',
    bgBand1: '#001229',
    bgBand2: '#001d3d',
    bgBand3: '#002a55',
    bgBand4: '#003566',
    bgBand5: '#004176',
    light: '#0077b6',
    bright: '#0096c7',
    bubble: '#90e0ef',
    bubbleLight: '#caf0f8',
    plankton: '#48cae4',
    rayLight: '#5fb8d9',
    rayDim: '#3a7a99',
    white: '#ffffff',
    skin: '#ffd6a5',
    skinDark: '#cd9b6a',
    hair: '#5c2c0d',
    hairLight: '#8b4513',
    goggle: '#22223b',
    goggleLens: '#a8dadc',
    suit: '#1b6b3a',
    suitDark: '#0d4a28',
    suitLight: '#2da05a',
    suitAccent: '#f0c030',
    jellyDark: '#d63384',
    jellyMid: '#ff69b4',
    jellyLight: '#ffb3d9',
    jellyGlow: '#ffd6e7',
    tentacle: '#ff9ec7',
    treat: '#ffd60a',
    treatLight: '#ffea7a',
    treatDark: '#fb8500',
    heartFull: '#ef233c',
    heartGlow: '#ff758f',
    heartEmpty: '#3d0000',
    netRim: '#caf0f8',
    netMesh: '#90e0ef',
    netHandle: '#8b4513',
    netHandleLight: '#cd853f',
  };

  // ============================================================
  // AUDIO - Chiptune music + SFX via Web Audio API
  // ============================================================
  const audio = {
    ctx: null,
    master: null,
    enabled: true,
    on: true,
    bpm: 128,
    step: 0,
    nextStepTime: 0,
  };

  const NOTE_FREQ = {
    'A2':110.00,'B2':123.47,'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,
    'A3':220.00,'B3':246.94,'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,
    'A4':440.00,'B4':493.88,'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,
    'A5':880.00,'B5':987.77,'C6':1046.50,
    'F2':87.31,'G2':98.00,'E2':82.41,'D2':73.42,
  };

  const PATTERN_LENGTH = 32;
  const bassPattern = [
    'A2', null, 'A2', null, 'E3', null, 'A2', null,
    'F2', null, 'F2', null, 'C3', null, 'F2', null,
    'C3', null, 'C3', null, 'G2', null, 'C3', null,
    'G2', null, 'G2', null, 'D3', null, 'G2', null,
  ];
  const leadPattern = [
    'A4', null, 'E5', null, null, 'C5', 'D5', null,
    'C5', null, 'A4', null, null, 'F4', 'A4', 'C5',
    'E5', null, 'G5', null, 'E5', 'D5', 'C5', null,
    'D5', null, 'B4', 'D5', null, 'G5', 'F5', 'D5',
  ];
  const arpPattern = [
    'A4','C5','E5','C5','A4','C5','E5','C5',
    'F4','A4','C5','A4','F4','A4','C5','A4',
    'C5','E5','G5','E5','C5','E5','G5','E5',
    'G4','B4','D5','B4','G4','B4','D5','B4',
  ];

  function initAudio() {
    if (audio.ctx) {
      if (audio.ctx.state === 'suspended') audio.ctx.resume();
      return;
    }
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) { audio.enabled = false; return; }
      audio.ctx = new AC();
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = audio.on ? 0.32 : 0;
      audio.master.connect(audio.ctx.destination);
    } catch(e) {
      audio.enabled = false;
    }
  }

  function playTone(freq, duration, type, volume, when) {
    if (!audio.ctx || !freq) return;
    const t = when != null ? when : audio.ctx.currentTime;
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(volume, t + 0.005);
    gain.gain.linearRampToValueAtTime(volume * 0.5, t + duration * 0.5);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.connect(gain);
    gain.connect(audio.master);
    osc.start(t);
    osc.stop(t + duration + 0.05);
  }

  function startMusic() {
    if (!audio.ctx) return;
    audio.step = 0;
    audio.nextStepTime = audio.ctx.currentTime + 0.1;
  }

  function updateMusic() {
    if (!audio.ctx || !audio.on) return;
    const stepDur = 60 / audio.bpm / 2;
    const lookAhead = 0.18;
    while (audio.nextStepTime < audio.ctx.currentTime + lookAhead) {
      const step = audio.step % PATTERN_LENGTH;
      if (bassPattern[step]) {
        playTone(NOTE_FREQ[bassPattern[step]], stepDur * 2 * 0.85, 'triangle', 0.20, audio.nextStepTime);
      }
      if (leadPattern[step]) {
        playTone(NOTE_FREQ[leadPattern[step]], stepDur * 1.8, 'square', 0.10, audio.nextStepTime);
      }
      if (arpPattern[step]) {
        playTone(NOTE_FREQ[arpPattern[step]], stepDur * 0.55, 'square', 0.04, audio.nextStepTime);
      }
      audio.step++;
      audio.nextStepTime += stepDur;
    }
  }

  function setMusicOn(on) {
    audio.on = on;
    if (audio.master && audio.ctx) {
      audio.master.gain.cancelScheduledValues(audio.ctx.currentTime);
      audio.master.gain.linearRampToValueAtTime(on ? 0.32 : 0, audio.ctx.currentTime + 0.05);
    }
    if (on && audio.ctx) {
      audio.nextStepTime = audio.ctx.currentTime + 0.05;
    }
    document.getElementById('muteBtn').classList.toggle('muted', !on);
  }

  function sfxTreat() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    playTone(NOTE_FREQ['C5'], 0.06, 'square', 0.18, t);
    playTone(NOTE_FREQ['E5'], 0.06, 'square', 0.18, t + 0.05);
    playTone(NOTE_FREQ['G5'], 0.06, 'square', 0.18, t + 0.10);
    playTone(NOTE_FREQ['C6'], 0.16, 'square', 0.20, t + 0.15);
  }

  function sfxHit() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(220, t);
    osc.frequency.exponentialRampToValueAtTime(60, t + 0.3);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.25, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain);
    gain.connect(audio.master);
    osc.start(t);
    osc.stop(t + 0.35);
  }

  function sfxGameOver() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    const notes = ['G4', 'F4', 'E4', 'D4', 'C4', 'B3', 'A3'];
    notes.forEach((n, i) => {
      playTone(NOTE_FREQ[n], 0.28, 'square', 0.16, t + i * 0.14);
    });
  }

  function sfxLowHealth() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    playTone(NOTE_FREQ['A4'], 0.08, 'square', 0.12, t);
    playTone(NOTE_FREQ['E4'], 0.10, 'square', 0.12, t + 0.08);
  }

  function sfxNetSwing() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    // Quick whoosh
    const osc = audio.ctx.createOscillator();
    const gain = audio.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(800, t);
    osc.frequency.exponentialRampToValueAtTime(400, t + 0.1);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.06, t + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain);
    gain.connect(audio.master);
    osc.start(t);
    osc.stop(t + 0.15);
  }

  function sfxNetCatch() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    // Cute capture chime
    playTone(NOTE_FREQ['E5'], 0.08, 'square', 0.18, t);
    playTone(NOTE_FREQ['G5'], 0.08, 'square', 0.18, t + 0.06);
    playTone(NOTE_FREQ['B5'], 0.16, 'triangle', 0.16, t + 0.12);
  }

  function sfxNetFail() {
    if (!audio.ctx || !audio.on) return;
    const t = audio.ctx.currentTime;
    playTone(NOTE_FREQ['C4'], 0.08, 'square', 0.08, t);
    playTone(NOTE_FREQ['B3'], 0.08, 'square', 0.08, t + 0.06);
  }

  // ============================================================
  // PRE-RENDERED PIXELATED BACKGROUND
  // ============================================================
  const bgCanvas = document.createElement('canvas');
  bgCanvas.width = W; bgCanvas.height = H;
  const bgCtx = bgCanvas.getContext('2d');

  // 4x4 Bayer matrix for ordered dithering
  const BAYER4 = [
    [ 0,  8,  2, 10],
    [12,  4, 14,  6],
    [ 3, 11,  1,  9],
    [15,  7, 13,  5],
  ];

  function predrawBackground() {
    const stops = [
      { y: 0,   c: C.bgBand0 },
      { y: 50,  c: C.bgBand1 },
      { y: 100, c: C.bgBand2 },
      { y: 150, c: C.bgBand3 },
      { y: 200, c: C.bgBand4 },
      { y: 240, c: C.bgBand5 },
    ];
    // Fill solid bands
    for (let i = 0; i < stops.length - 1; i++) {
      bgCtx.fillStyle = stops[i].c;
      bgCtx.fillRect(0, stops[i].y, W, stops[i+1].y - stops[i].y);
    }
    // Add Bayer-dithered transitions (12px tall) at each band boundary
    const ditherZone = 12;
    for (let i = 0; i < stops.length - 1; i++) {
      const boundary = stops[i+1].y;
      const c0 = stops[i].c;
      const c1 = stops[i+1].c;
      for (let dy = -ditherZone; dy < ditherZone; dy++) {
        const y = boundary + dy;
        if (y < 0 || y >= H) continue;
        // Mix factor goes 0->1 across the dither zone
        const t = (dy + ditherZone) / (ditherZone * 2);
        for (let x = 0; x < W; x++) {
          const bayer = BAYER4[y % 4][x % 4] / 16;
          const useUpper = t < bayer;
          bgCtx.fillStyle = useUpper ? c0 : c1;
          bgCtx.fillRect(x, y, 1, 1);
        }
      }
    }
  }
  predrawBackground();

  // ============================================================

  let game;
  let bestDepth = 0;
  try { bestDepth = parseInt(localStorage.getItem('jellyswim_best') || '0'); } catch(e) {}
  let lastTime = 0;
  const keys = {};
  let touch = null;
  let mouseDown = false;
  let shake = 0;

  // Background-layer animated elements (light columns, plankton)
  const lightColumns = [];
  const plankton = [];
  const menuJellies = [];

  function initBackgroundLayers() {
    lightColumns.length = 0;
    for (let i = 0; i < 7; i++) {
      lightColumns.push({
        x: Math.random() * W,
        width: 1 + Math.floor(Math.random() * 2), // 1-2 px wide
        speed: 0.04 + Math.random() * 0.05,       // sideways drift
        phase: Math.random() * Math.PI * 2,
        pulseSpeed: 0.5 + Math.random() * 0.6,
        offsetX: (Math.random() - 0.5) * 0.8,    // tilt direction
      });
    }
    plankton.length = 0;
    for (let i = 0; i < 28; i++) {
      plankton.push({
        x: Math.random() * W,
        y: Math.random() * H,
        speed: 0.08 + Math.random() * 0.18,
        size: Math.random() < 0.7 ? 1 : 1, // always 1px - cleanest
        bright: Math.random() < 0.4,       // some glow
        flicker: Math.random() * Math.PI * 2,
        flickerSpeed: 0.5 + Math.random() * 1.5,
      });

    for (let i = 0; i < 6; i++) {
      menuJellies.push({
        x: Math.random() * (W - 20) + 3,
        y: Math.random() * H,
        w: 14, h: 16,
        bob: Math.random() * Math.PI * 2,
        bobSpeed: 0.025 + Math.random() * 0.025,
        drift: (Math.random() - 0.5) * 0.25,

  }

  function init() {
    game = {
      state: 'playing',
      player: {
        x: W/2 - 8, y: H - 50, w: 16, h: 22,
        animFrame: 0, animTimer: 0
      },
      hearts: 5,
      maxHearts: 5,
      depth: 0,
      jellyfish: [],
      treats: [],
      bubbles: [],
      particles: [],
      popups: [],
      scrollSpeed: 0.5,
      jellyTimer: 130,
      treatTimer: 200,
      bubbleTimer: 0,
      invulnerable: 0,
      flashTimer: 0,
      healthDrainTimer: 0,
      time: 0,
      // Net
      netTimer: 0,        // > 0 while net is extended
      netCooldown: 0,     // > 0 while cooling down
      netDuration: 0.4,
      netMaxCooldown: 1.0,
      jelliesCaught: 0,
      caughtJellies: [],  // visual: shrinking caught jellies
    };
    for (let i = 0; i < 18; i++) {
      game.bubbles.push({

      });

  function fr(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
  }

  // ---- INPUT ----
  document.addEventListener('keydown', e => {
    keys[e.key.toLowerCase()] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key.toLowerCase() === 'm') setMusicOn(!audio.on);
    if (e.key.toLowerCase() === 'c' && game && game.state === 'playing') {
      tryNetSwing();
    }
  });
  document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  function getCanvasCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) / rect.width * W,
      y: (clientY - rect.top) / rect.height * H
    };
  }

  // Track touch start for tap-vs-drag distinction
  let touchStartCoords = null;
  let touchStartTime = 0;

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (e.touches.length > 0) {
      const coords = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
      touch = coords;
      touchStartCoords = { ...coords };
      touchStartTime = Date.now();
    }
  }, {passive: false});
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length > 0) touch = getCanvasCoords(e.touches[0].clientX, e.touches[0].clientY);
  }, {passive: false});
  canvas.addEventListener('touchend', e => {
    e.preventDefault();
    // Detect tap: short duration + small movement = try to catch a jelly
    if (touchStartCoords && game && game.state === 'playing') {
      const dt = Date.now() - touchStartTime;
      const dx = (touch ? touch.x : touchStartCoords.x) - touchStartCoords.x;
      const dy = (touch ? touch.y : touchStartCoords.y) - touchStartCoords.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dt < 260 && dist < 10) {
        tryTapCatch(touchStartCoords.x, touchStartCoords.y);
      }
    }
    touch = null;
    touchStartCoords = null;
  }, {passive: false});

  canvas.addEventListener('mousedown', e => {
    mouseDown = true;
    touch = getCanvasCoords(e.clientX, e.clientY);
  });
  canvas.addEventListener('mousemove', e => {
    if (mouseDown) touch = getCanvasCoords(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseup', () => { mouseDown = false; touch = null; });
  canvas.addEventListener('mouseleave', () => { mouseDown = false; touch = null; });

  // ---- NET MECHANIC ----
  function tryNetSwing() {
    if (!game || game.state !== 'playing') return;
    if (game.netCooldown > 0 || game.netTimer > 0) {
      sfxNetFail();
      return;
    }
    game.netTimer = game.netDuration;
    game.netCooldown = game.netMaxCooldown;
    sfxNetSwing();
  }

  // Mobile tap-to-catch: check if tap coords hit any jellyfish directly
  function tryTapCatch(cx, cy) {
    if (!game || game.state !== 'playing') return;
    if (game.netCooldown > 0) { sfxNetFail(); return; }
    // Find nearest jelly within tap radius
    const TAP_RADIUS = 18; // canvas pixels, generous for touch
    let closest = null, closestDist = Infinity;
    for (const j of game.jellyfish) {
      const jcx = j.x + 7, jcy = j.y + 7;
      const d = Math.sqrt((cx - jcx) ** 2 + (cy - jcy) ** 2);
      if (d < TAP_RADIUS && d < closestDist) {
        closest = j;
        closestDist = d;
      }
    }
    if (closest) {
      catchJellyfish(closest);
      game.jellyfish = game.jellyfish.filter(j => j !== closest);
      game.netCooldown = game.netMaxCooldown;
    } else {
      // Swing animation but miss
      game.netTimer = game.netDuration;
      game.netCooldown = game.netMaxCooldown;
      sfxNetSwing();
    }
  }

  function catchJellyfish(j) {
    game.jelliesCaught++;
    game.depth += 3;
    sfxNetCatch();
    game.caughtJellies.push({
      x: j.x, y: j.y, w: j.w, h: j.h,
      bob: j.bob, tentacleAnim: j.tentacleAnim,
      scale: 1, life: 0.4
    });
    for (let p = 0; p < 12; p++) {
      const a = Math.random() * Math.PI * 2;
      const sp = Math.random() * 2.5 + 0.5;
      game.particles.push({
        x: j.x + 7, y: j.y + 7,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 0.3,
        life: 0.4 + Math.random() * 0.3,
        color: [C.bubbleLight, C.white, C.netMesh][Math.floor(Math.random() * 3)],
        size: 1
      });
    }
    game.popups.push({
      x: j.x + 2, y: j.y - 2,
      text: '+3', color: C.bubbleLight, life: 0.8
    });
  }

  // Net hitbox - extends above the player
  function getNetHitbox() {
    const p = game.player;
    const swingProgress = 1 - (game.netTimer / game.netDuration);
    const reach = Math.sin(swingProgress * Math.PI) * 14;
    return {
      x: p.x - 1,
      y: p.y - reach - 4,
      w: p.w + 2,
      h: 12
    };
  }

  // ---- DRAWING SPRITES ----
  function drawSwimmer(p) {

    fr(x+3, y+3, 2, 4, C.suit);   // left side of hood
    fr(x+11,y+3, 2, 4, C.suit);   // right side of hood

    fr(x+11,y+1, 1, 1, C.suitLight);

    // Right torso edge shadow

    // Center highlight stripe (wetsuit panel)

    // === LEGS ===
    if (f === 0) {
      // Legs together

      fr(x+9, y+17, 1, 4, C.suitDark);
      // Flippers
      fr(x+4, y+21, 4, 2, C.suitDark);
      fr(x+8, y+21, 4, 2, C.suitDark);
      fr(x+5, y+21, 2, 1, C.suit);

      fr(x+5, y+17, 2, 4, C.suit);

      fr(x+3, y+21, 4, 2, C.suitDark);
      fr(x+9, y+21, 4, 2, C.suitDark);
      fr(x+4, y+21, 2, 1, C.suit);
      fr(x+10,y+21, 2, 1, C.suit);
      // Bigger bubble kicks
      fr(x+2, y+22, 2, 1, C.bubbleLight);
      fr(x+12,y+22, 2, 1, C.bubbleLight);
      fr(x+1, y+21, 1, 1, C.bubble);

  function drawNet() {
    if (game.netTimer <= 0) return;
    const p = game.player;
    const swingProgress = 1 - (game.netTimer / game.netDuration); // 0 -> 1
    const reach = Math.sin(swingProgress * Math.PI) * 14;
    const tilt = (swingProgress - 0.5) * 4; // slight side sweep

    const baseX = Math.floor(p.x + 3);  // start from left arm/hand
    const baseY = Math.floor(p.y + 8);  // hand position
    const tipX = Math.floor(p.x + p.w/2 + tilt);
    const tipY = Math.floor(p.y - reach + 2);

    // Draw handle (line from hand to net hoop)
    drawLine(baseX, baseY, tipX, tipY + 4, C.netHandle);
    drawLine(baseX + 1, baseY, tipX + 1, tipY + 4, C.netHandleLight);

    // Draw net hoop (pixel ring) at tipX, tipY
    // 12-wide x 6-tall flat oval
    const hx = tipX - 6, hy = tipY - 2;
    // Top rim
    fr(hx + 3, hy, 6, 1, C.netRim);
    // Sides
    fr(hx + 1, hy + 1, 1, 1, C.netRim);
    fr(hx + 2, hy + 1, 1, 1, C.netRim);
    fr(hx + 9, hy + 1, 1, 1, C.netRim);
    fr(hx + 10, hy + 1, 1, 1, C.netRim);
    fr(hx, hy + 2, 1, 2, C.netRim);
    fr(hx + 11, hy + 2, 1, 2, C.netRim);
    fr(hx + 1, hy + 4, 1, 1, C.netRim);
    fr(hx + 10, hy + 4, 1, 1, C.netRim);
    // Bottom rim
    fr(hx + 2, hy + 5, 8, 1, C.netRim);
    fr(hx + 3, hy + 6, 6, 1, C.netRim);

    // Mesh inside (sparse dots)
    fr(hx + 3, hy + 2, 1, 1, C.netMesh);
    fr(hx + 5, hy + 2, 1, 1, C.netMesh);
    fr(hx + 7, hy + 2, 1, 1, C.netMesh);
    fr(hx + 4, hy + 3, 1, 1, C.netMesh);
    fr(hx + 6, hy + 3, 1, 1, C.netMesh);
    fr(hx + 8, hy + 3, 1, 1, C.netMesh);
    fr(hx + 3, hy + 4, 1, 1, C.netMesh);
    fr(hx + 5, hy + 4, 1, 1, C.netMesh);
    fr(hx + 7, hy + 4, 1, 1, C.netMesh);

    // Sparkle on swing peak
    if (swingProgress > 0.4 && swingProgress < 0.6) {
      fr(hx + 11, hy - 1, 1, 1, C.white);
      fr(hx - 1, hy + 1, 1, 1, C.white);
    }
  }

  function drawLine(x0, y0, x1, y1, color) {
    // Bresenham
    let dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
    let sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
    let err = dx - dy;
    let x = x0, y = y0;
    let safety = 100;
    while (safety-- > 0) {
      fr(x, y, 1, 1, color);
      if (x === x1 && y === y1) break;
      let e2 = 2 * err;
      if (e2 > -dy) { err -= dy; x += sx; }
      if (e2 < dx) { err += dx; y += sy; }
    }
  }

  function drawJelly(j) {
    const x = Math.floor(j.x);
    const y = Math.floor(j.y + Math.sin(j.bob) * 1.5);
    const pulse = Math.floor(j.bob * 2) % 4;
    const t = j.tentacleAnim;

    if (pulse === 0) {
      fr(x - 1, y + 2, 1, 1, C.jellyLight);
      fr(x + 14, y + 4, 1, 1, C.jellyLight);
    } else if (pulse === 2) {
      fr(x + 7, y - 1, 1, 1, C.jellyGlow);
      fr(x + 15, y + 3, 1, 1, C.jellyLight);
    }

    // Apply scale (used for catch animation)
    const scale = j.scale != null ? j.scale : 1;
    if (scale < 1) {
      // Just draw smaller version - skip detail
      const cx = x + 7, cy = y + 7;
      const r = Math.max(1, Math.floor(7 * scale));
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dx*dx + dy*dy <= r*r) {
            fr(cx + dx, cy + dy, 1, 1, C.jellyMid);
          }
        }
      }
      return;
    }

    fr(x+4, y+0, 6, 1, C.jellyMid);
    fr(x+2, y+1, 10, 1, C.jellyMid);
    fr(x+3, y+1, 8, 1, C.jellyLight);
    fr(x+1, y+2, 12, 1, C.jellyMid);
    fr(x+2, y+2, 10, 1, C.jellyLight);
    fr(x, y+3, 14, 1, C.jellyMid);
    fr(x+1, y+3, 12, 1, C.jellyLight);
    fr(x, y+4, 14, 1, C.jellyMid);
    fr(x+1, y+4, 12, 1, C.jellyLight);
    fr(x, y+5, 14, 1, C.jellyMid);
    fr(x+1, y+5, 12, 1, C.jellyLight);
    fr(x, y+6, 14, 1, C.jellyDark);

    fr(x+3, y+1, 1, 1, C.jellyGlow);
    fr(x+2, y+2, 2, 1, C.jellyGlow);
    fr(x+2, y+3, 1, 2, C.jellyGlow);
    fr(x+3, y+2, 1, 1, C.white);

    fr(x+5, y+3, 4, 1, C.jellyMid);
    fr(x+5, y+4, 4, 1, C.jellyDark);
    fr(x+6, y+5, 2, 1, C.jellyMid);

    const positions = [1, 4, 9, 12];
    positions.forEach((tx, i) => {
      for (let row = 0; row < 7; row++) {
        const offset = Math.round(Math.sin(t * 1.5 + i * 0.7 + row * 0.5) * 1.3);
        const color = row < 4 ? C.tentacle : C.jellyLight;
        fr(x + tx + offset, y + 7 + row, 1, 1, color);
      }
    });
    for (let row = 0; row < 9; row++) {
      const offset1 = Math.round(Math.sin(t * 2 + row * 0.4) * 1.5);
      const offset2 = Math.round(Math.cos(t * 1.8 + row * 0.4) * 1.5);
      fr(x + 6 + offset1, y + 7 + row, 1, 1, row < 5 ? C.tentacle : C.jellyLight);
      fr(x + 8 + offset2, y + 7 + row, 1, 1, row < 5 ? C.tentacle : C.jellyLight);
    }
  }

  function drawTreat(t) {
    const x = Math.floor(t.x);
    const y = Math.floor(t.y + Math.sin(t.bob) * 1);

    const sp = Math.floor(t.sparkle / 5) % 8;
    if (sp === 0) {
      fr(x + 11, y + 2, 1, 1, C.white);
      fr(x + 10, y + 2, 1, 1, C.bubbleLight);
      fr(x + 11, y + 1, 1, 1, C.bubbleLight);
      fr(x + 11, y + 3, 1, 1, C.bubbleLight);
    } else if (sp === 3) {
      fr(x - 2, y + 6, 1, 1, C.white);
      fr(x - 1, y + 6, 1, 1, C.bubbleLight);
      fr(x - 2, y + 5, 1, 1, C.bubbleLight);
      fr(x - 2, y + 7, 1, 1, C.bubbleLight);
    } else if (sp === 5) {
      fr(x + 4, y - 2, 1, 1, C.white);
      fr(x + 5, y - 2, 1, 1, C.bubbleLight);
      fr(x + 4, y - 3, 1, 1, C.bubbleLight);
    } else if (sp === 6) {
      fr(x - 1, y, 1, 1, C.white);

    fr(x+2, y+0, 6, 1, '#ff69b4');

    fr(x+0, y+2, 10, 1, '#ff1493');
    fr(x+0, y+3, 3, 1, '#ff1493');
    fr(x+7, y+3, 3, 1, '#ff1493');
    fr(x+0, y+4, 2, 1, '#ff1493');
    fr(x+8, y+4, 2, 1, '#ff1493');
    fr(x+0, y+5, 2, 1, C.treat);
    fr(x+8, y+5, 2, 1, C.treat);
    fr(x+0, y+6, 3, 1, C.treat);
    fr(x+7, y+6, 3, 1, C.treat);
    fr(x+0, y+7, 10, 1, C.treatDark);
    fr(x+1, y+8, 8, 1, C.treatDark);
    fr(x+2, y+9, 6, 1, C.treatDark);

    fr(x+1, y+1, 1, 1, '#ff69b4');
    fr(x+2, y+1, 1, 1, '#ff69b4');
    fr(x+0, y+3, 1, 1, '#ff69b4');
    fr(x+3, y+0, 1, 1, C.white);
    fr(x+5, y+1, 1, 1, C.bubble);
    fr(x+7, y+1, 1, 1, C.white);
    fr(x+1, y+2, 1, 1, C.bright);
    fr(x+8, y+2, 1, 1, '#ff69b4');

    fr(x+0, y+7, 1, 1, C.treat);
    fr(x+9, y+7, 1, 1, C.treatDark);
    fr(x+7, y+9, 1, 1, C.treat);
  }

  function drawHeart(x, y, full, glow) {

  // 5x5 pixel font
  const FONT = {
    '0': ['111','101','101','101','111'],
    '1': ['010','110','010','010','111'],
    '2': ['111','001','111','100','111'],
    '3': ['111','001','111','001','111'],
    '4': ['101','101','111','001','001'],
    '5': ['111','100','111','001','111'],
    '6': ['111','100','111','101','111'],
    '7': ['111','001','010','100','100'],
    '8': ['111','101','111','101','111'],
    '9': ['111','101','111','001','111'],
    'm': ['00000','11011','11111','10101','10101'],
    ':': ['0','1','0','1','0'],
    ' ': ['0','0','0','0','0'],
    '+': ['000','010','111','010','000'],
    '-': ['000','000','111','000','000'],
    'y': ['101','101','111','010','010'],
    'u': ['101','101','101','101','111'],
  };
  function drawText(text, x, y, color) {
    text = text.toLowerCase();
    let cx = x;
    for (const ch of text) {
      const glyph = FONT[ch];
      if (!glyph) { cx += 4; continue; }
      const w = glyph[0].length;
      for (let row = 0; row < glyph.length; row++) {
        for (let col = 0; col < w; col++) {
          if (glyph[row][col] === '1') {
            fr(cx + col, y + row, 1, 1, color);
          }
        }
      }
      cx += w + 1;
    }
    return cx;
  }

  // ---- UPDATE ----
  function update(dt) {
    if (game.state !== 'playing') return;

    game.time += dt;

    const speed = 90;
    let dx = 0, dy = 0;
    if (keys['arrowleft'] || keys['a']) dx -= 1;
    if (keys['arrowright'] || keys['d']) dx += 1;
    if (keys['arrowup'] || keys['w']) dy -= 1;
    if (keys['arrowdown'] || keys['s']) dy += 1;
    const mag = Math.sqrt(dx*dx + dy*dy);
    if (mag > 0) { dx /= mag; dy /= mag; }

    if (touch) {
      const px = game.player.x + game.player.w/2;
      const py = game.player.y + game.player.h/2;
      const tx = touch.x - px;
      const ty = touch.y - py;
      const dist = Math.sqrt(tx*tx + ty*ty);
      if (dist > 3) {
        const f = Math.min(1, dist / 30);
        dx = tx / dist * f;
        dy = ty / dist * f;
      }
    }

    game.player.x += dx * speed * dt;
    game.player.y += dy * speed * dt;
    game.player.x = Math.max(2, Math.min(W - game.player.w - 2, game.player.x));
    game.player.y = Math.max(18, Math.min(H - game.player.h - 4, game.player.y));

    game.player.animTimer += dt;
    if (game.player.animTimer > 0.18) {
      game.player.animTimer = 0;
      game.player.animFrame = (game.player.animFrame + 1) % 2;
    }

    game.depth += game.scrollSpeed * 0.4;
    game.scrollSpeed = 0.5 + Math.min(1.0, game.depth / 1200);

    // Update background animation layers
    lightColumns.forEach(col => {
      col.x += col.speed;
      col.phase += col.pulseSpeed * dt;
      if (col.x > W + 5) col.x = -5;
    });
    plankton.forEach(p => {
      p.y -= p.speed + game.scrollSpeed * 0.3;
      p.flicker += p.flickerSpeed * dt;
      if (p.y < -2) {
        p.y = H + 2;
        p.x = Math.random() * W;
      }
    });

    game.healthDrainTimer += dt;
    const drainInterval = Math.max(7, 11 - game.depth / 600);
    if (game.healthDrainTimer > drainInterval) {
      game.healthDrainTimer = 0;
      game.hearts -= 1;
      game.flashTimer = 0.3;
      shake = 2;
      if (game.hearts === 2) sfxLowHealth();
      if (game.hearts <= 0) { gameOver(); return; }
    }

    // Net update
    if (game.netTimer > 0) {
      game.netTimer -= dt;
      // Check net collisions with jellyfish
      const netBox = getNetHitbox();
      for (let i = game.jellyfish.length - 1; i >= 0; i--) {
        const j = game.jellyfish[i];
        const jBox = { x: j.x + 1, y: j.y + 1, w: j.w - 2, h: j.h - 4 };
        if (collide(netBox, jBox)) {
          catchJellyfish(j);
          game.jellyfish.splice(i, 1);
        }
      }
    }
    if (game.netCooldown > 0) game.netCooldown -= dt;

    // Update caught jelly animations
    game.caughtJellies.forEach(c => {
      c.life -= dt;
      c.scale = Math.max(0, c.life / 0.4);
    });
    game.caughtJellies = game.caughtJellies.filter(c => c.life > 0);

    // Spawn jellyfish
    game.jellyTimer -= dt * 60;
    if (game.jellyTimer <= 0) {
      const baseInterval = Math.max(50, 130 - game.depth / 18);
      game.jellyTimer = baseInterval + Math.random() * 30;
      const groupBonus = Math.floor(game.depth / 450);
      const groupSize = 1 + Math.floor(Math.random() * (1 + groupBonus));
      for (let i = 0; i < Math.min(3, groupSize); i++) {
        game.jellyfish.push({
          x: Math.random() * (W - 16) + 1,
          y: -20 - i * 38 - Math.random() * 12,
          w: 14, h: 16,
          bob: Math.random() * Math.PI * 2,
          bobSpeed: 0.04 + Math.random() * 0.04,
          drift: (Math.random() - 0.5) * 0.4,
          tentacleAnim: Math.random() * Math.PI * 2,
          verticalSpeed: 0.1 + Math.random() * 0.3
        });
      }
    }

    // Spawn treats
    game.treatTimer -= dt * 60;
    if (game.treatTimer <= 0) {
      const treatInterval = game.hearts < 3 ? 130 : 220;
      game.treatTimer = treatInterval + Math.random() * 130;
      game.treats.push({
        x: Math.random() * (W - 14) + 2,
        y: -20,
        w: 10, h: 10,
        bob: Math.random() * Math.PI * 2,
        sparkle: 0,
        collected: false
      });
    }

    game.jellyfish.forEach(j => {
      j.y += game.scrollSpeed + j.verticalSpeed * 0.3;
      j.x += j.drift;
      j.bob += j.bobSpeed;
      j.tentacleAnim += 0.08;
      if (j.x < 0) { j.x = 0; j.drift = Math.abs(j.drift); }
      if (j.x > W - 14) { j.x = W - 14; j.drift = -Math.abs(j.drift); }
    });
    game.jellyfish = game.jellyfish.filter(j => j.y < H + 30);

    game.treats.forEach(t => {
      t.y += game.scrollSpeed * 0.9;
      t.bob += 0.1;
      t.sparkle += 1;
    });
    game.treats = game.treats.filter(t => t.y < H + 20 && !t.collected);

    game.bubbleTimer -= dt;
    if (game.bubbleTimer <= 0) {
      game.bubbleTimer = 0.04 + Math.random() * 0.08;
      game.bubbles.push({
        x: Math.random() * W,
        y: H + 5,
        r: Math.random() * 1.5 + 0.5,
        vy: -(Math.random() * 0.5 + 0.4 + game.scrollSpeed * 0.5),
        drift: (Math.random() - 0.5) * 0.3
      });
    }
    game.bubbles.forEach(b => {
      b.y += b.vy;
      b.x += b.drift + Math.sin(b.y * 0.05) * 0.1;
    });
    game.bubbles = game.bubbles.filter(b => b.y > -5 && b.y < H + 10);

    if (Math.random() < 0.4) {
      game.bubbles.push({
        x: game.player.x + 4 + Math.random() * 8,
        y: game.player.y + 19,
        r: Math.random() * 0.8 + 0.4,
        vy: -(Math.random() * 0.6 + 0.6),
        drift: (Math.random() - 0.5) * 0.3
      });
    }

    game.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.life -= dt;
      p.vy += 0.04;
      p.vx *= 0.96;
    });
    game.particles = game.particles.filter(p => p.life > 0);

    game.popups.forEach(p => {
      p.y -= 0.4;
      p.life -= dt;
    });
    game.popups = game.popups.filter(p => p.life > 0);

    if (game.invulnerable > 0) game.invulnerable -= dt;
    if (game.flashTimer > 0) game.flashTimer -= dt;
    if (shake > 0) shake -= dt * 8;

    // Jelly collision
    if (game.invulnerable <= 0) {
      for (const j of game.jellyfish) {
        const jBox = { x: j.x + 1, y: j.y + 1, w: j.w - 2, h: j.h - 4 };
        if (collide(game.player, jBox)) {
          game.hearts -= 1;
          game.invulnerable = 1.6;
          game.flashTimer = 0.5;
          shake = 4;
          sfxHit();
          for (let i = 0; i < 12; i++) {
            game.particles.push({
              x: game.player.x + 8 + (Math.random() - 0.5) * 6,
              y: game.player.y + 11,
              vx: (Math.random() - 0.5) * 4,
              vy: (Math.random() - 0.5) * 4 - 0.5,
              life: 0.4 + Math.random() * 0.3,
              color: Math.random() < 0.5 ? C.jellyMid : C.jellyLight,
              size: Math.random() < 0.4 ? 2 : 1
            });
          }
          game.popups.push({
            x: game.player.x + 6, y: game.player.y - 4,
            text: '-1', color: C.heartFull, life: 0.8
          });
          if (game.hearts === 2) sfxLowHealth();
          if (game.hearts <= 0) { gameOver(); return; }
          break;
        }
      }
    }

    // Treat collection
    for (const t of game.treats) {
      if (!t.collected && collide(game.player, t)) {
        t.collected = true;
        const healed = game.hearts < game.maxHearts;
        if (healed) game.hearts += 1;
        game.healthDrainTimer = Math.max(0, game.healthDrainTimer - 4);
        sfxTreat();
        for (let i = 0; i < 14; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = Math.random() * 2 + 1;
          game.particles.push({
            x: t.x + 5, y: t.y + 5,
            vx: Math.cos(a) * sp,
            vy: Math.sin(a) * sp - 0.5,
            life: 0.5 + Math.random() * 0.4,
            color: [C.treat, C.white, C.suitLight][Math.floor(Math.random() * 3)],
            size: 1
          });
        }
        game.popups.push({
          x: t.x, y: t.y,
          text: healed ? '+1' : 'yum',
          color: healed ? C.heartFull : C.treat,
          life: 0.9
        });
      }
    }
  }

  function collide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // ---- RENDER ----
  function render() {
    ctx.save();
    if (shake > 0) {
      ctx.translate(
        Math.floor((Math.random() - 0.5) * shake),
        Math.floor((Math.random() - 0.5) * shake)
      );
    }

    // 1. Pre-rendered banded/dithered gradient background
    ctx.drawImage(bgCanvas, 0, 0);

    // 2. Animated chunky pixel light columns
    lightColumns.forEach(col => {
      const intensity = 0.5 + Math.sin(col.phase) * 0.5; // 0..1
      if (intensity < 0.15) return;
      const w = col.width;
      const cx = Math.floor(col.x);
      // Column tilts as it goes down
      for (let y = 0; y < H; y++) {
        const alpha = intensity * (1 - y / H * 0.4); // fades with depth
        if (alpha < 0.1) continue;
        // Quantize alpha into 3 levels for pixel-art feel
        let color;
        if (alpha > 0.55) color = C.rayLight;
        else if (alpha > 0.3) color = C.rayDim;
        else continue; // skip very faint pixels for chunky look
        const xOff = Math.floor(y * col.offsetX * 0.05);
        // Stipple pattern - skip every 3rd pixel for "shimmering" look
        if ((y + Math.floor(col.phase * 3)) % 3 === 0) continue;
        fr(cx + xOff, y, w, 1, color);
      }
    });

    // 3. Plankton specks (background dust)
    plankton.forEach(p => {
      const flick = Math.sin(p.flicker);
      if (flick < -0.5) return; // some flicker off
      const color = (p.bright && flick > 0.4) ? C.bubbleLight : C.plankton;
      fr(p.x, p.y, 1, 1, color);
    });

    // 4. Foreground bubbles
    game.bubbles.forEach(b => {
      const r = Math.max(1, Math.floor(b.r));
      fr(b.x - r, b.y - r, r*2, r*2, C.bubble);
      if (r > 1) fr(b.x - r, b.y - r, 1, 1, C.bubbleLight);
    });

    // 5. Treats
    game.treats.forEach(drawTreat);

    // 6. Caught jellies (shrinking)
    game.caughtJellies.forEach(drawJelly);

    // 7. Jellyfish
    game.jellyfish.forEach(drawJelly);

    // 8. Net (drawn behind player so handle goes "into" hand)
    drawNet();

    // 9. Player
    const drawPlayer = !(game.invulnerable > 0 && Math.floor(game.invulnerable * 12) % 2 === 0);
    if (drawPlayer) drawSwimmer(game.player);

    // 10. Particles
    game.particles.forEach(p => {
      const alpha = Math.min(1, p.life * 3);
      if (alpha < 0.5 && Math.random() < 0.3) return;
      fr(p.x, p.y, p.size, p.size, p.color);
    });

    // 11. Popups
    game.popups.forEach(p => {
      if (p.life > 0.3 || Math.floor(p.life * 12) % 2 === 0) {
        drawText(p.text, p.x, p.y, p.color);
      }
    });

    // 12. Hit flash
    if (game.flashTimer > 0) {
      ctx.fillStyle = `rgba(255, 0, 100, ${Math.min(0.5, game.flashTimer)})`;
      ctx.fillRect(0, 0, W, H);
    }

    ctx.restore();

    drawUI();
  }

  function drawUI() {
    fr(0, 0, W, 14, 'rgba(0, 8, 20, 0.7)');
    fr(0, 14, W, 1, C.jellyDark);
    fr(0, 15, W, 1, 'rgba(0,0,0,0.4)');

    for (let i = 0; i < game.maxHearts; i++) {
      const full = i < game.hearts;
      const glow = full && Math.floor(game.time * 3) % 2 === 0 && i === game.hearts - 1;
      drawHeart(3 + i * 11, 4, full, glow);
    }

    const depthStr = Math.floor(game.depth) + 'm';
    let xpos = W - 4;
    for (let i = depthStr.length - 1; i >= 0; i--) {
      const ch = depthStr[i].toLowerCase();
      const glyph = FONT[ch];
      const w = glyph ? glyph[0].length : 3;
      xpos -= (w + 1);
    }
    drawText(depthStr, xpos + 1, 5, C.bubbleLight);

    if (game.hearts <= 2 && Math.floor(game.time * 3) % 2 === 0) {
      ctx.fillStyle = 'rgba(239, 35, 60, 0.15)';
      ctx.fillRect(0, 16, W, H - 16);
    }
  }



  // ============================================================
  // LEADERBOARD
  // ============================================================
  const LB_KEY = 'jellyfish_adventures_lb';

  function lbLoad() {
    try { return JSON.parse(localStorage.getItem(LB_KEY) || '[]'); } catch(e) { return []; }
  }

  function lbSave(entries) {
    try { localStorage.setItem(LB_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  function lbAddEntry(name, depth, caught) {
    const entries = lbLoad();
    entries.push({ name: name.trim().toUpperCase() || 'ANON', depth, caught, date: Date.now() });
    entries.sort((a, b) => b.depth - a.depth);
    const trimmed = entries.slice(0, 10);
    lbSave(trimmed);
    return trimmed;
  }

  function lbRender() {
    const entries = lbLoad();
    const tbody = document.getElementById('lbBody');
    const empty = document.getElementById('lbEmpty');
    const table = document.getElementById('lbTable');
    tbody.innerHTML = '';
    if (entries.length === 0) {
      table.style.display = 'none';
      empty.style.display = 'block';
    } else {
      table.style.display = '';
      empty.style.display = 'none';
      entries.forEach((e, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td class="lb-rank">${i + 1}</td><td>${e.name}</td><td>${e.caught}</td><td>${e.depth}m</td>`;
        tbody.appendChild(tr);
      });
    }
  }

  function showOverlay(id) {
    ['startScreen','nameScreen','gameOverScreen','leaderboardScreen'].forEach(s => {
      document.getElementById(s).classList.remove('active');
    });
    if (id) document.getElementById(id).classList.add('active');
    document.getElementById('escHint').style.display = 'none';
  }

  function showMainMenu() {
    game.state = 'menu';
    showOverlay('startScreen');
  }

  // ============================================================

  function gameOver() {
    game.state = 'gameover';
    sfxGameOver();
    if (game.depth > bestDepth) {
      bestDepth = Math.floor(game.depth);
      try { localStorage.setItem('jellyswim_best', String(bestDepth)); } catch(e) {}
    }
    const depth = Math.floor(game.depth);
    const caught = game.jelliesCaught;
    // Fill game-over card
    document.getElementById('finalDepth').textContent = 'Depth: ' + depth + 'm';
    document.getElementById('bestDepth').textContent = 'Best: ' + bestDepth + 'm';
    document.getElementById('caughtCount').textContent = 'Jellies caught: ' + caught;
    // Show name entry first
    document.getElementById('nameDepthLine').textContent = 'Depth: ' + depth + 'm  |  Caught: ' + caught;
    document.getElementById('nameInput').value = '';
    setTimeout(() => {
      showOverlay('nameScreen');
      // Focus input on desktop
      setTimeout(() => { try { document.getElementById('nameInput').focus(); } catch(e){} }, 100);
    }, 700);
  }

  function submitScore() {
    if (!game) return;
    const name = document.getElementById('nameInput').value;
    lbAddEntry(name, Math.floor(game.depth), game.jelliesCaught);
    showOverlay('gameOverScreen');
  }

  function loop(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000 || 0);
    lastTime = now;
    if (game) {
      update(dt);
      render();
      updateMusic();
    }
    requestAnimationFrame(loop);
  }

  function startGame() {
    initAudio();
    if (audio.ctx && audio.ctx.state === 'suspended') audio.ctx.resume();
    showOverlay(null);
    document.getElementById('escHint').style.display = 'block';
    init();
    startMusic();
    lastTime = performance.now();
  }

  // ---- BUTTON WIRING ----
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', startGame);
  document.getElementById('muteBtn').addEventListener('click', e => {
    e.stopPropagation(); initAudio(); setMusicOn(!audio.on);
  });
  document.getElementById('nameSaveBtn').addEventListener('click', submitScore);
  document.getElementById('nameSkipBtn').addEventListener('click', () => showOverlay('gameOverScreen'));
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); submitScore(); }
  });
  // Leaderboard open/close
  document.getElementById('lbOpenBtn').addEventListener('click', () => { lbRender(); showOverlay('leaderboardScreen'); });
  document.getElementById('lbOpenBtn2').addEventListener('click', () => { lbRender(); showOverlay('leaderboardScreen'); });
  document.getElementById('lbCloseBtn').addEventListener('click', () => {
    // Return to appropriate screen
    if (!game || game.state === 'menu') { showOverlay('startScreen'); }
    else { showOverlay('gameOverScreen'); }
  });

  // ---- ESC KEY ----
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      e.preventDefault();
      if (game && game.state === 'playing') {
        showMainMenu();
      } else {
        // From any other overlay, Esc goes back to main menu
        const lbActive = document.getElementById('leaderboardScreen').classList.contains('active');
        const goActive = document.getElementById('gameOverScreen').classList.contains('active');
        const nameActive = document.getElementById('nameScreen').classList.contains('active');
        if (lbActive || goActive || nameActive) showOverlay('startScreen');
      }
    }
  });

  init();
  game.state = 'menu';

  function staticLoop() {
    game.time += 1/60;
    game.bubbleTimer -= 1/60;
    if (game.bubbleTimer <= 0) {
      game.bubbleTimer = 0.06;
      game.bubbles.push({
        x: Math.random() * W,
        y: H + 5,
        r: Math.random() * 1.5 + 0.5,
        vy: -(Math.random() * 0.5 + 0.4),
        drift: (Math.random() - 0.5) * 0.3
      });
    }
    game.bubbles.forEach(b => {
      b.y += b.vy;
      b.x += b.drift + Math.sin(b.y * 0.05) * 0.1;
    });
    game.bubbles = game.bubbles.filter(b => b.y > -5 && b.y < H + 10);

    // Update background animation layers in menu too
    lightColumns.forEach(col => {
      col.x += col.speed;
      col.phase += col.pulseSpeed * (1/60);
      if (col.x > W + 5) col.x = -5;
    });
    plankton.forEach(p => {
      p.y -= p.speed;
      p.flicker += p.flickerSpeed * (1/60);
      if (p.y < -2) {
        p.y = H + 2;
        p.x = Math.random() * W;
      }
    });

    // Update menu jellyfish
    menuJellies.forEach(j => {
      j.y -= j.verticalSpeed;
      j.x += j.drift + Math.sin(j.bob * 0.7) * 0.15;
      j.bob += j.bobSpeed;
      j.tentacleAnim += 0.07;
      if (j.x < 2) { j.x = 2; j.drift = Math.abs(j.drift); }
      if (j.x > W - 16) { j.x = W - 16; j.drift = -Math.abs(j.drift); }
      if (j.y < -30) {
        j.y = H + 10;
        j.x = Math.random() * (W - 20) + 3;
        j.drift = (Math.random() - 0.5) * 0.25;
      }
    });

    if (game.state === 'menu' || game.state === 'gameover') {
      // Draw same animated background
      ctx.drawImage(bgCanvas, 0, 0);
      lightColumns.forEach(col => {
        const intensity = 0.5 + Math.sin(col.phase) * 0.5;
        if (intensity < 0.15) return;
        const w = col.width;
        const cx = Math.floor(col.x);
        for (let y = 0; y < H; y++) {
          const alpha = intensity * (1 - y / H * 0.4);
          if (alpha < 0.1) continue;
          let color;
          if (alpha > 0.55) color = C.rayLight;
          else if (alpha > 0.3) color = C.rayDim;
          else continue;
          const xOff = Math.floor(y * col.offsetX * 0.05);
          if ((y + Math.floor(col.phase * 3)) % 3 === 0) continue;
          fr(cx + xOff, y, w, 1, color);
        }
      });
      plankton.forEach(p => {
        const flick = Math.sin(p.flicker);
        if (flick < -0.5) return;
        const color = (p.bright && flick > 0.4) ? C.bubbleLight : C.plankton;
        fr(p.x, p.y, 1, 1, color);
      });
      game.bubbles.forEach(b => {
        const r = Math.max(1, Math.floor(b.r));
        fr(b.x - r, b.y - r, r*2, r*2, C.bubble);
        if (r > 1) fr(b.x - r, b.y - r, 1, 1, C.bubbleLight);
      });
      menuJellies.forEach(drawJelly);
      requestAnimationFrame(staticLoop);
    } else if (game.state === 'playing') {
      lastTime = performance.now();
      requestAnimationFrame(loop);
    } else {
      requestAnimationFrame(staticLoop);
    }
  }
  requestAnimationFrame(staticLoop);

})();
