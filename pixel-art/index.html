<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pixel Art</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#1a0838;--panel:#fff;--red:#f44336;--gold:#FFD700;
  --green:#4CAF50;--blue:#2196F3;--purple:#9C27B0;--pink:#E91E63;
  --orange:#FF9800;--teal:#00BCD4;--accent:#FF6B6B;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;}
.screen{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;}
.screen.active{display:flex;}

/* ─── STARS BG ─── */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ─── MENU ─── */
#menu-screen{gap:20px;z-index:1;}
.menu-floats{display:flex;gap:20px;margin-bottom:4px;}
.float-emoji{font-size:36px;animation:float var(--d,3s) ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.title-wrap{text-align:center;}
.pixel-title{font-size:clamp(40px,10vw,80px);font-weight:900;letter-spacing:6px;
  background:linear-gradient(135deg,#FF6B6B,#FFD93D,#6BCB77,#4D96FF,#C77DFF,#FF6B6B);
  background-size:300% 300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shift 4s linear infinite;
  text-shadow:none;font-family:'Trebuchet MS',sans-serif;}
@keyframes shift{0%{background-position:0%50%}50%{background-position:100%50%}100%{background-position:0%50%}}
.pixel-subtitle{color:rgba(255,255,255,.65);font-size:15px;margin-top:4px;letter-spacing:1px;}
.menu-hints{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.hint-chip{background:rgba(255,255,255,.12);padding:7px 14px;border-radius:20px;color:#fff;font-size:13px;backdrop-filter:blur(4px);}
.btn-play{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;border:none;
  padding:16px 52px;border-radius:50px;font-size:22px;font-weight:800;cursor:pointer;
  box-shadow:0 6px 24px rgba(255,107,107,.5);transition:all .15s;letter-spacing:2px;}
.btn-play:hover{transform:scale(1.07);box-shadow:0 8px 32px rgba(255,107,107,.7);}
.btn-play:active{transform:scale(.97);}
.island-credit{color:rgba(255,255,255,.35);font-size:12px;}

/* ─── GAME ─── */
#game-screen{padding:8px;gap:6px;z-index:1;align-items:center;}
.game-hud{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:560px;padding:0 4px;}
.hud-hearts{display:flex;gap:3px;}
.hud-coins{display:flex;align-items:center;gap:5px;background:rgba(255,215,0,.15);
  padding:5px 12px;border-radius:20px;color:var(--gold);font-weight:800;font-size:17px;border:1px solid rgba(255,215,0,.3);}
.hud-prompt{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.1);
  padding:5px 12px;border-radius:14px;color:#fff;font-size:13px;font-weight:700;border:1px solid rgba(255,255,255,.15);}

.game-body{display:flex;gap:10px;align-items:flex-start;}
#drawing-canvas{border-radius:10px;cursor:crosshair;box-shadow:0 6px 24px rgba(0,0,0,.4);
  background:#fff;image-rendering:pixelated;display:block;touch-action:none;}

.sidebar{display:flex;flex-direction:column;gap:8px;align-items:center;}
.prompt-box{background:#fff;border-radius:14px;padding:10px;text-align:center;
  box-shadow:0 4px 16px rgba(0,0,0,.25);position:relative;}
.zoom-btn{background:rgba(0,0,0,.10);border:none;border-radius:7px;
  width:20px;height:20px;font-size:11px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:background .1s;padding:0;}
.zoom-btn:hover{background:rgba(0,0,0,.22);}
.prompt-name-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:4px;}
.prompt-name{font-size:12px;font-weight:700;color:#333;}

/* Zoom overlay */
.zoom-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;
  align-items:center;justify-content:center;z-index:250;animation:fadeIn .15s;cursor:pointer;}
.zoom-box{background:#fff;border-radius:20px;padding:20px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  box-shadow:0 12px 48px rgba(0,0,0,.5);animation:popIn .2s cubic-bezier(.175,.885,.32,1.275);}
.zoom-box-label{font-size:13px;color:#888;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:10px;}
.zoom-box-name{font-size:16px;font-weight:800;color:#333;margin-top:10px;}
.zoom-hint{font-size:11px;color:#bbb;margin-top:6px;}
.prompt-box-label{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
#prompt-canvas{border-radius:6px;image-rendering:pixelated;display:block;}
.prompt-name{font-size:12px;font-weight:700;color:#333;margin-top:4px;}

.shop-side-btn{background:linear-gradient(135deg,#FFD93D,#FF8E53);color:#fff;border:none;
  border-radius:14px;padding:10px 14px;font-size:14px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(255,217,61,.4);transition:all .15s;width:100%;letter-spacing:.5px;}
.shop-side-btn:hover{transform:scale(1.08);}

.game-footer{display:flex;gap:8px;align-items:flex-start;width:100%;max-width:560px;}
.palette-panel{background:#fff;border-radius:14px;padding:9px;box-shadow:0 4px 16px rgba(0,0,0,.2);flex:1;}
.color-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px;}
.swatch{width:100%;aspect-ratio:1;border-radius:4px;cursor:pointer;transition:transform .1s;border:2px solid transparent;min-width:0;}
.swatch:hover{transform:scale(1.2);z-index:2;position:relative;}
.swatch.sel{border-color:#111;transform:scale(1.15);}
.swatch.eraser{background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid #ddd!important;color:#999;}
.swatch.eraser.sel{border-color:#111!important;}
.brush-row{display:flex;align-items:center;gap:6px;margin-top:7px;}
.brush-lbl{font-size:11px;color:#888;font-weight:600;white-space:nowrap;}
.brush-btn{flex:1;padding:5px 0;border-radius:8px;border:2px solid #ddd;background:#f5f5f5;
  cursor:pointer;font-size:11px;font-weight:700;color:#666;transition:all .1s;}
.brush-btn.sel{background:#333;border-color:#333;color:#fff;}

.action-col{display:flex;flex-direction:column;gap:7px;}
.btn-done{background:linear-gradient(135deg,#6BCB77,#44AA55);color:#fff;border:none;
  padding:11px 20px;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 14px rgba(107,203,119,.4);transition:all .15s;white-space:nowrap;}
.btn-done:hover{transform:scale(1.05);}
.btn-clear{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
  padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;transition:all .1s;}
.btn-clear:hover{background:rgba(255,255,255,.2);}
.btn-undo{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.25);
  padding:8px 16px;border-radius:10px;font-size:13px;cursor:pointer;transition:all .1s;}
.btn-undo:hover{background:rgba(255,255,255,.2);}
.btn-undo:disabled{opacity:.3;cursor:not-allowed;}

/* Pack selector in sidebar */
.pack-selector{background:#fff;border-radius:14px;padding:8px 10px;
  box-shadow:0 4px 16px rgba(0,0,0,.25);width:100%;}
.pack-selector-label{font-size:10px;color:#888;font-weight:700;text-transform:uppercase;
  letter-spacing:1px;margin-bottom:6px;text-align:center;}
.pack-chips{display:flex;flex-direction:column;gap:5px;}
.pack-chip{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:10px;
  border:2px solid #eee;background:#f9f9f9;cursor:pointer;transition:all .12s;font-size:12px;font-weight:700;color:#444;}
.pack-chip:hover{background:#f0f0f0;border-color:#ccc;}
.pack-chip.active{color:#fff;border-color:transparent;box-shadow:0 3px 10px rgba(0,0,0,.2);}
.pack-chip-icon{font-size:16px;flex-shrink:0;}
.pack-chip-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ─── SHOP ─── */
#shop-screen{z-index:1;padding:16px;gap:12px;overflow-y:auto;}
.shop-hdr{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:620px;}
.shop-title{font-size:26px;font-weight:900;color:#fff;letter-spacing:2px;}
.shop-hdr-right{display:flex;align-items:center;gap:12px;}
.shop-coins{color:var(--gold);font-size:18px;font-weight:800;}
.btn-back{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;
  padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:700;transition:all .1s;}
.btn-back:hover{background:rgba(255,255,255,.25);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;width:100%;max-width:620px;}
.shop-card{background:#fff;border-radius:18px;padding:18px 12px;text-align:center;cursor:pointer;
  transition:all .15s;box-shadow:0 4px 16px rgba(0,0,0,.2);border-top:5px solid #ddd;position:relative;overflow:hidden;}
.shop-card:hover{transform:translateY(-5px);box-shadow:0 10px 28px rgba(0,0,0,.3);}
.shop-card.owned{opacity:.6;cursor:default;}
.shop-card-icon{font-size:38px;margin-bottom:8px;}
.shop-card-name{font-size:14px;font-weight:800;color:#222;margin-bottom:3px;}
.shop-card-desc{font-size:11px;color:#777;margin-bottom:8px;}
.shop-card-cost{font-size:14px;font-weight:800;color:var(--gold);}
.shop-card-owned-badge{color:#4CAF50;font-weight:800;font-size:13px;}
.shop-msg{color:var(--gold);font-size:14px;text-align:center;min-height:22px;font-weight:700;}

/* ─── MODAL ─── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:26px;padding:36px 44px;text-align:center;max-width:360px;width:90%;animation:popIn .3s cubic-bezier(.175,.885,.32,1.275);}
@keyframes popIn{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
.modal-emoji{font-size:68px;margin-bottom:10px;}
.modal-title{font-size:26px;font-weight:900;margin-bottom:8px;}
.modal-text{font-size:15px;color:#555;margin-bottom:22px;line-height:1.5;}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-modal{padding:11px 26px;border:none;border-radius:50px;font-size:15px;font-weight:800;cursor:pointer;transition:all .1s;}
.btn-modal:hover{transform:scale(1.05);}
.btn-modal-green{background:linear-gradient(135deg,#6BCB77,#44AA55);color:#fff;box-shadow:0 4px 14px rgba(107,203,119,.4);}
.btn-modal-blue{background:linear-gradient(135deg,#4D96FF,#2979FF);color:#fff;box-shadow:0 4px 14px rgba(77,150,255,.4);}
.btn-modal-orange{background:linear-gradient(135deg,#FF6B6B,#FF8E53);color:#fff;box-shadow:0 4px 14px rgba(255,107,107,.4);}

/* ─── FX ─── */
.confetti-stage{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;}
.confetti-piece{position:absolute;top:-20px;animation:confFall linear forwards;}
@keyframes confFall{to{transform:translateY(120vh) rotate(720deg);opacity:0}}
.coin-burst{position:fixed;pointer-events:none;z-index:300;font-size:28px;
  animation:coinFly .9s ease-out forwards;}
@keyframes coinFly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-110px) scale(.3);opacity:0}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;
  padding:12px 26px;border-radius:50px;font-size:15px;font-weight:700;z-index:400;white-space:nowrap;
  animation:toastAnim 2.4s ease forwards;}
@keyframes toastAnim{
  0%{opacity:0;transform:translateX(-50%) translateY(18px)}
  18%{opacity:1;transform:translateX(-50%) translateY(0)}
  80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-10px)}}

/* ─── RESPONSIVE ─── */
@media(max-width:520px){
  .sidebar{flex-direction:row;flex-wrap:wrap;align-items:center;gap:6px;}
  .sidebar .prompt-box{flex:1;min-width:90px;}
  .sidebar .shop-side-btn{flex:0 0 auto;width:auto;padding:8px 12px;}
  .game-body{flex-direction:column;align-items:center;}
  .color-grid{grid-template-columns:repeat(10,1fr);}
}
</style>
</head>
<body>

<!-- BACKGROUND STARS -->
<div id="stars"></div>

<!-- ══════════════════════════════════════════════════════════
     MENU SCREEN
════════════════════════════════════════════════════════════ -->
<div id="menu-screen" class="screen active">
  <div class="menu-floats">
    <span class="float-emoji" style="--d:2.5s">🎨</span>
    <span class="float-emoji" style="--d:3.2s">⭐</span>
    <span class="float-emoji" style="--d:2.8s">🍉</span>
    <span class="float-emoji" style="--d:3.6s">🐱</span>
    <span class="float-emoji" style="--d:2.2s">✨</span>
  </div>
  <div class="title-wrap">
    <div class="pixel-title">PIXEL ART</div>
  </div>
  <div class="menu-hints">
    <div class="hint-chip">🖊️ Draw the prompt</div>
    <div class="hint-chip">💰 Earn 100 coins</div>
    <div class="hint-chip">🏪 Unlock new packs</div>
    <div class="hint-chip">❤️ Don't lose all hearts!</div>
  </div>
  <button class="btn-play" onclick="startGame()">▶ &nbsp;Play!</button>
  <div class="island-credit">Made with ❤️ by Whimsy Labs in Lee's Summit. This game is all Eloise's idea!</div>
</div>

<!-- ══════════════════════════════════════════════════════════
     GAME SCREEN
════════════════════════════════════════════════════════════ -->
<div id="game-screen" class="screen">
  <div class="game-hud" id="game-hud"></div>
  <div class="game-body">
    <canvas id="drawing-canvas"></canvas>
    <div class="sidebar">
      <div class="prompt-box">
        <div class="prompt-box-label">Draw This!</div>
        <canvas id="prompt-canvas" width="80" height="80"></canvas>
        <div class="prompt-name-row">
          <span id="prompt-name-label">—</span>
          <button class="zoom-btn" onclick="openZoom()" title="Zoom in">🔍</button>
        </div>
      </div>
      <div class="pack-selector" id="pack-selector"></div>
      <button class="shop-side-btn" onclick="openShop()" title="Shop">Store</button>
    </div>
  </div>
  <div class="game-footer" id="game-footer"></div>
</div>

<!-- ══════════════════════════════════════════════════════════
     SHOP SCREEN
════════════════════════════════════════════════════════════ -->
<div id="shop-screen" class="screen">
  <div class="shop-hdr">
    <button class="btn-back" onclick="closeShop()">← Back</button>
    <div class="shop-title">🏪 Shop</div>
    <div class="shop-hdr-right">
      <div class="shop-coins" id="shop-coins-display">💰 0</div>
    </div>
  </div>
  <div class="shop-grid" id="shop-grid"></div>
  <div class="shop-msg" id="shop-msg"></div>
</div>

<script>
'use strict';

/* ═══════════════════════════════════════════════════════════
   STAR BACKGROUND
═══════════════════════════════════════════════════════════ */
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s;opacity:.4;`;
    c.appendChild(s);
  }
})();

/* ═══════════════════════════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════════════════════════ */
let AC=null,musicOn=false,musicTimer=null;
function initAudio(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();}
function note(f,t,d,type='square',vol=0.06){
  if(!AC||f<=0)return;
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  o.type=type;o.frequency.value=f;
  g.gain.setValueAtTime(vol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+d*.9);
  o.start(t);o.stop(t+d);
}
const MEL=[
  [523,.25],[659,.25],[784,.25],[659,.25],[523,.5],[392,.25],[440,.25],
  [523,.25],[659,.25],[784,.25],[880,.25],[784,.5],[659,.5],
  [523,.25],[587,.25],[659,.25],[698,.25],[784,.5],[659,.25],[523,.25],
  [440,.25],[494,.25],[523,.25],[659,.25],[523,1.0],
];
const BASS=[
  [131,.5],[0,.5],[131,.5],[0,.5],[110,.5],[0,.5],[110,.5],[0,.5],
  [131,.5],[0,.5],[131,.5],[0,.5],[131,.5],[0,.5],[131,.5],[0,.5],
];
function scheduleMusic(){
  if(!musicOn)return;
  let t=AC.currentTime+.05;
  MEL.forEach(([f,d])=>{note(f,t,d,'square',.04);t+=d;});
  let tb=AC.currentTime+.05;
  for(let i=0;i<2;i++)BASS.forEach(([f,d])=>{note(f,tb,d,'sawtooth',.025);tb+=d;});
  const tot=MEL.reduce((s,[,d])=>s+d,0);
  musicTimer=setTimeout(scheduleMusic,(tot-.1)*1000);
}
function startMusic(){if(!AC||musicOn)return;musicOn=true;AC.resume().then(scheduleMusic);}
function stopMusic(){musicOn=false;if(musicTimer)clearTimeout(musicTimer);if(AC)AC.suspend();}
function sfx(type){
  if(!AC)return;
  const t=AC.currentTime;
  if(type==='success')[523,659,784,1047].forEach((f,i)=>note(f,t+i*.1,.2,'square',.07));
  else if(type==='fail')[220,180,130].forEach((f,i)=>note(f,t+i*.12,.18,'sawtooth',.07));
  else if(type==='click')note(880,t,.04,'square',.035);
  else if(type==='coin')[784,1047,1319].forEach((f,i)=>note(f,t+i*.07,.12,'square',.055));
  else if(type==='buy')[523,659,784].forEach((f,i)=>note(f,t+i*.08,.15,'triangle',.08));
  else if(type==='gameover')[523,440,349,261].forEach((f,i)=>note(f,t+i*.2,.3,'sawtooth',.07));
  else if(type==='newlevel')[523,659,784,1047,1319].forEach((f,i)=>note(f,t+i*.09,.18,'square',.07));
}

/* ═══════════════════════════════════════════════════════════
   GRID HELPERS
═══════════════════════════════════════════════════════════ */
const G=16;
function mkGrid(){return Array.from({length:G},()=>Array(G).fill(null));}
function fc(g,cx,cy,r,col){
  for(let y=0;y<G;y++)for(let x=0;x<G;x++)if((x-cx)**2+(y-cy)**2<=r*r)g[y][x]=col;
}
function fr(g,x1,y1,x2,y2,col){
  for(let y=Math.max(0,y1);y<=Math.min(G-1,y2);y++)
    for(let x=Math.max(0,x1);x<=Math.min(G-1,x2);x++)g[y][x]=col;
}
function px(g,x,y,col){if(x>=0&&x<G&&y>=0&&y<G)g[y][x]=col;}
function halfCirc(g,cx,cy,r,col,top){
  for(let y=0;y<G;y++)for(let x=0;x<G;x++)
    if((x-cx)**2+(y-cy)**2<=r*r&&(top?y<=cy:y>=cy))g[y][x]=col;
}

/* ═══════════════════════════════════════════════════════════
   TARGET GENERATORS (23 prompts)
═══════════════════════════════════════════════════════════ */
const T={
  watermelon(){
    const g=mkGrid();
    halfCirc(g,8,4,9,'#1B5E20',false);halfCirc(g,8,4,8,'#4CAF50',false);
    halfCirc(g,8,4,7,'#FF5566',false);
    fr(g,1,4,14,4,'#1B5E20');fr(g,2,5,13,5,'#4CAF50');fr(g,2,5,13,5,'#FF5566');
    [[8,7],[5,8],[11,8],[4,10],[8,10],[12,10],[6,12],[10,12]].forEach(([x,y])=>{if(g[y]?.[x])g[y][x]='#1a1a1a';});
    return g;
  },
  heart(){
    const g=mkGrid();
    fc(g,5,5,4,'#F44336');fc(g,11,5,4,'#F44336');
    for(let y=5;y<15;y++){const w=Math.max(0,8-(y-4)*.7);fr(g,Math.round(8-w),y,Math.round(8+w),y,'#F44336');}
    return g;
  },
  star(){
    const g=mkGrid();
    const cx=7.5,cy=7.5,oR=7,iR=2.5,pts=5;
    for(let y=0;y<G;y++)for(let x=0;x<G;x++){
      const dx=x-cx,dy=y-cy,dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>oR)continue;
      const ang=Math.atan2(dy,dx)+Math.PI/2;

function resetState(){

    hearts:3,maxHearts:5,coins:0,
    grid:mkGrid(),color:'#F44336',brush:1,erasing:false,drawing:false,
    prompt:null,
    packs:JSON.parse(JSON.stringify(PACK_DEFS)),
    history:[],activePack:'starter',
  };

function unlockedPrompts(){
  return S.packs.filter(p=>p.unlocked||p.cost===0).flatMap(p=>p.prompts);
}

function unlockedPacks(){
  return S.packs.filter(p=>p.unlocked||p.cost===0);
}

function pickPrompt(){
  // Pick from active pack if set, else all unlocked
  const activePack=S.packs.find(p=>p.id===S.activePack&&(p.unlocked||p.cost===0));
  const pool=activePack?activePack.prompts:unlockedPrompts();
  const others=S.prompt?pool.filter(p=>p.key!==S.prompt.key):pool;
  const src=others.length?others:pool;
  return src[Math.floor(Math.random()*src.length)];
}

function switchPack(packId){
  S.activePack=packId;
  S.prompt=pickPrompt();
  S.grid=mkGrid();
  S.history=[];
  sfx('click');
  renderGame();
}

/* ═══════════════════════════════════════════════════════════
   CANVAS
═══════════════════════════════════════════════════════════ */
let cell=24,dCanvas,dCtx,pCanvas,pCtx;

function calcCell(){
  const w=window.innerWidth,h=window.innerHeight;
  const sidebar=Math.min(w*.28,120);
  const mw=Math.min(w-sidebar-60,h-230,500);
  return Math.max(14,Math.floor(mw/G));
}

function initCanvas(){
  cell=calcCell();
  dCanvas=document.getElementById('drawing-canvas');
  dCanvas.width=G*cell;dCanvas.height=G*cell;
  pCanvas=document.getElementById('prompt-canvas');
  dCtx=dCanvas.getContext('2d');
  pCtx=pCanvas.getContext('2d');

  // Events
  dCanvas.onmousedown=e=>{saveHistory();S.drawing=true;paint(e);};
  dCanvas.onmousemove=e=>{if(S.drawing)paint(e);};
  dCanvas.onmouseup=dCanvas.onmouseleave=()=>S.drawing=false;
  dCanvas.addEventListener('touchstart',e=>{e.preventDefault();saveHistory();S.drawing=true;paintTouch(e);},{passive:false});
  dCanvas.addEventListener('touchmove',e=>{e.preventDefault();if(S.drawing)paintTouch(e);},{passive:false});
  dCanvas.addEventListener('touchend',()=>S.drawing=false,{passive:false});
}

function pos(e){
  const r=dCanvas.getBoundingClientRect();
  const sx=dCanvas.width/r.width,sy=dCanvas.height/r.height;
  return{col:Math.floor((e.clientX-r.left)*sx/cell),row:Math.floor((e.clientY-r.top)*sy/cell)};
}

function paint(e){const{row,col}=pos(e);brushPaint(row,col);}
function paintTouch(e){
  const t=e.touches[0];
  const{row,col}=pos({clientX:t.clientX,clientY:t.clientY});
  brushPaint(row,col);
}

function brushPaint(row,col){
  const col2=S.erasing?null:S.color;
  const r=S.brush;
  for(let dy=-(r-1);dy<r;dy++)for(let dx=-(r-1);dx<r;dx++){
    const nr=row+dy,nc=col+dx;
    if(nr>=0&&nr<G&&nc>=0&&nc<G)S.grid[nr][nc]=col2;
  }
  renderGrid();
}

function saveHistory(){
  S.history.push(S.grid.map(r=>[...r]));
  if(S.history.length>30)S.history.shift();
}

function undo(){
  if(!S.history.length)return;
  S.grid=S.history.pop();
  renderGrid();
  renderFooter(); // refresh undo button disabled state
  sfx('click');
}

/* ═══════════════════════════════════════════════════════════
   RENDER
═══════════════════════════════════════════════════════════ */
function renderGrid(){
  const ctx=dCtx,cs=cell;
  ctx.fillStyle='#FAFAFA';ctx.fillRect(0,0,G*cs,G*cs);
  for(let r=0;r<G;r++)for(let c=0;c<G;c++){
    if(S.grid[r][c]){ctx.fillStyle=S.grid[r][c];ctx.fillRect(c*cs,r*cs,cs,cs);}
  }
  ctx.strokeStyle='rgba(0,0,0,.07)';ctx.lineWidth=.5;
  for(let i=0;i<=G;i++){
    ctx.beginPath();ctx.moveTo(i*cs,0);ctx.lineTo(i*cs,G*cs);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*cs);ctx.lineTo(G*cs,i*cs);ctx.stroke();
  }
  ctx.strokeStyle='rgba(0,0,0,.18)';ctx.lineWidth=2;
  ctx.strokeRect(0,0,G*cs,G*cs);
}

function renderPrompt(){
  if(!S.prompt)return;
  const tg=T[S.prompt.key]();
  const ctx=pCtx,s=80/G;
  ctx.fillStyle='#FAFAFA';ctx.fillRect(0,0,80,80);
  for(let r=0;r<G;r++)for(let c=0;c<G;c++){
    if(tg[r][c]){ctx.fillStyle=tg[r][c];ctx.fillRect(c*s,r*s,s,s);}
  }
  ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=.3;
  for(let i=0;i<=G;i++){
    ctx.beginPath();ctx.moveTo(i*s,0);ctx.lineTo(i*s,80);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*s);ctx.lineTo(80,i*s);ctx.stroke();
  }
  document.getElementById('prompt-name-label').textContent=S.prompt.name;
}

function openZoom(){
  if(!S.prompt)return;
  sfx('click');
  const maxSz=Math.min(window.innerWidth*.85,window.innerHeight*.75,360);
  const size=Math.floor(maxSz/G)*G; // snap to grid multiple
  const s=size/G;

  const ov=document.createElement('div');ov.className='zoom-overlay';ov.id='zoom-ov';

  const box=document.createElement('div');box.className='zoom-box';
  box.style.cssText='display:flex;flex-direction:column;align-items:center;gap:10px;';

  const cv=document.createElement('canvas');
  cv.width=size;cv.height=size;
  cv.style.cssText=`display:block;border-radius:10px;image-rendering:pixelated;width:${size}px;height:${size}px;`;

  const nameEl=document.createElement('div');nameEl.className='zoom-box-name';
  nameEl.textContent=S.prompt.emoji+' '+S.prompt.name;

  const hint=document.createElement('div');hint.className='zoom-hint';
  hint.textContent='Tap anywhere to close';

  box.appendChild(cv);
  box.appendChild(nameEl);
  box.appendChild(hint);
  ov.appendChild(box);
  document.body.appendChild(ov);

  // Draw after DOM insertion so canvas is ready
  requestAnimationFrame(()=>{
    const ctx=cv.getContext('2d');
    const tg=T[S.prompt.key]();
    ctx.fillStyle='#FAFAFA';ctx.fillRect(0,0,size,size);
    for(let r=0;r<G;r++)for(let c=0;c<G;c++){
      if(tg[r][c]){ctx.fillStyle=tg[r][c];ctx.fillRect(Math.round(c*s),Math.round(r*s),Math.ceil(s),Math.ceil(s));}
    }
    ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;
    for(let i=0;i<=G;i++){
      ctx.beginPath();ctx.moveTo(i*s,0);ctx.lineTo(i*s,size);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*s);ctx.lineTo(size,i*s);ctx.stroke();
    }
  });

  ov.onclick=()=>ov.remove();
  box.onclick=e=>e.stopPropagation();
}

  const cd=document.createElement('div');cd.className='hud-coins';cd.innerHTML=`💰 ${S.coins}`;
  const pd=document.createElement('div');pd.className='hud-prompt';
  pd.innerHTML=`<span style="font-size:20px">${S.prompt?.emoji||'?'}</span>${S.prompt?.name||''}`;
  hud.appendChild(hc);hud.appendChild(cd);hud.appendChild(pd);
}

function renderFooter(){
  const footer=document.getElementById('game-footer');
  footer.innerHTML='';

  // ── Palette ──
  const pal=document.createElement('div');pal.className='palette-panel';
  const cg=document.createElement('div');cg.className='color-grid';
  PALETTE.forEach(col=>{
    const sw=document.createElement('div');sw.className='swatch'+(col===S.color&&!S.erasing?' sel':'');
    sw.style.background=col;
    if(col==='#FFFFFF')sw.style.border='2px solid #ddd';
    sw.onclick=()=>{S.color=col;S.erasing=false;sfx('click');renderFooter();};
    cg.appendChild(sw);
  });
  // Eraser
  const er=document.createElement('div');
  er.className='swatch eraser'+(S.erasing?' sel':'');er.textContent='✕';er.title='Eraser';
  er.onclick=()=>{S.erasing=!S.erasing;sfx('click');renderFooter();};
  cg.appendChild(er);
  pal.appendChild(cg);

  // Brush sizes
  const br=document.createElement('div');br.className='brush-row';
  const bl=document.createElement('span');bl.className='brush-lbl';bl.textContent='Brush:';
  br.appendChild(bl);
  [['S',1],['M',2],['L',3]].forEach(([lbl,sz])=>{
    const b=document.createElement('button');b.className='brush-btn'+(S.brush===sz?' sel':'');
    b.textContent=lbl;b.onclick=()=>{S.brush=sz;sfx('click');renderFooter();};
    br.appendChild(b);
  });
  pal.appendChild(br);
  footer.appendChild(pal);

  // ── Actions ──
  const ac=document.createElement('div');ac.className='action-col';
  const doneBt=document.createElement('button');doneBt.className='btn-done';doneBt.textContent='Submit!';doneBt.onclick=checkAccuracy;
  const undoBt=document.createElement('button');undoBt.className='btn-undo';undoBt.textContent='Undo';
  undoBt.disabled=S.history.length===0;
  undoBt.onclick=undo;
  const clearBt=document.createElement('button');clearBt.className='btn-clear';clearBt.textContent='Clear';
  clearBt.onclick=()=>{saveHistory();S.grid=mkGrid();renderGrid();renderFooter();sfx('click');};
  ac.appendChild(doneBt);ac.appendChild(undoBt);ac.appendChild(clearBt);
  footer.appendChild(ac);
}

function renderPackSelector(){
  const el=document.getElementById('pack-selector');
  if(!el)return;
  const packs=unlockedPacks();
  if(packs.length<=1){el.style.display='none';return;}
  el.style.display='';
  el.innerHTML='<div class="pack-selector-label">📦 My Packs</div>';
  const chips=document.createElement('div');chips.className='pack-chips';
  packs.forEach(pack=>{
    const chip=document.createElement('div');
    chip.className='pack-chip'+(S.activePack===pack.id?' active':'');
    if(S.activePack===pack.id)chip.style.background=pack.color;
    chip.innerHTML=`<span class="pack-chip-icon">${pack.icon}</span><span class="pack-chip-name">${pack.name}</span>`;
    chip.onclick=()=>{if(S.activePack!==pack.id)switchPack(pack.id);};
    chips.appendChild(chip);
  });
  el.appendChild(chips);
}

function renderGame(){
  renderHUD();renderPrompt();renderGrid();renderFooter();renderPackSelector();
}

/* ═══════════════════════════════════════════════════════════
   ACCURACY CHECK
═══════════════════════════════════════════════════════════ */
function checkAccuracy(){
  if(!S.prompt)return;
  sfx('click');
  const tg=T[S.prompt.key]();
  let tPx=0,match=0,uPx=0,fp=0;
  for(let r=0;r<G;r++)for(let c=0;c<G;c++){
    const isTg=tg[r][c]!==null,isDr=S.grid[r][c]!==null;
    if(isTg)tPx++;if(isDr)uPx++;
    if(isTg&&isDr)match++;if(!isTg&&isDr)fp++;
  }
  if(uPx<6){showModal('✏️','Keep Going!','Draw more of the picture first!',false,false,true);return;}
  const recall=match/tPx;
  const penalty=Math.min(fp/(G*G*.35),.5)*.4;
  const score=Math.max(0,recall-penalty);

  if(score>=.42){
    // ✅ SUCCESS
    S.coins+=100;
    sfx('success');showConfetti(S.prompt.theme||['⭐']);
    const p=S.prompt;
    const next=pickPrompt();
    showModal('🎉','Amazing Drawing!',
      `You drew a ${p.name}! <b>+100 coins</b> 🪙<br><br>Next up: ${next.emoji} ${next.name}`,
      true,false,false,()=>{
        S.prompt=next;S.grid=mkGrid();S.history=[];renderGame();
      });
    renderHUD();
  } else {
    // ❌ FAIL
    S.hearts--;sfx('fail');renderHUD();
    if(S.hearts<=0){
      setTimeout(()=>{sfx('gameover');showGameOver();},400);
    } else {
      showModal('💔','Not Quite!',
        `Cover more of the ${S.prompt.name}! Keep trying.<br>Hearts left: ${'❤️'.repeat(S.hearts)}`,
        false,true,false);
    }
  }
}

/* ═══════════════════════════════════════════════════════════
   SHOP
═══════════════════════════════════════════════════════════ */
function openShop(){
  sfx('click');
  hideAll();document.getElementById('shop-screen').classList.add('active');
  renderShop();
}
function closeShop(){
  sfx('click');
  hideAll();document.getElementById('game-screen').classList.add('active');
  renderGame();
}

function renderShop(){
  document.getElementById('shop-coins-display').textContent='💰 '+S.coins;
  const grid=document.getElementById('shop-grid');grid.innerHTML='';

  // Packs (exclude starter)
  S.packs.filter(p=>p.cost>0).forEach(pack=>{
    const card=document.createElement('div');
    card.className='shop-card'+(pack.unlocked?' owned':'');
    card.style.borderTopColor=pack.color;
    card.innerHTML=`
      <div class="shop-card-icon">${pack.icon}</div>
      <div class="shop-card-name">${pack.name}</div>
      <div class="shop-card-desc">${pack.desc}</div>
      ${pack.unlocked
        ?'<div class="shop-card-owned-badge">✅ Owned!</div>'
        :`<div class="shop-card-cost">💰 ${pack.cost} coins</div>`}`;
    if(!pack.unlocked)card.onclick=()=>buyPack(pack);
    grid.appendChild(card);
  });

  // +1 Heart
  const hCard=document.createElement('div');
  hCard.className='shop-card'+(S.hearts>=S.maxHearts?' owned':'');
  hCard.style.borderTopColor='#F44336';
  hCard.innerHTML=`
    <div class="shop-card-icon">❤️</div>
    <div class="shop-card-name">+1 Heart</div>
    <div class="shop-card-desc">Extra life to keep drawing!</div>
    ${S.hearts>=S.maxHearts
      ?'<div class="shop-card-owned-badge">Max Hearts!</div>'
      :'<div class="shop-card-cost">💰 30 coins</div>'}`;
  if(S.hearts<S.maxHearts)hCard.onclick=buyHeart;
  grid.appendChild(hCard);

  // Skip prompt
  const skCard=document.createElement('div');
  skCard.className='shop-card';skCard.style.borderTopColor='#9C27B0';
  skCard.innerHTML=`
    <div class="shop-card-icon">🔀</div>
    <div class="shop-card-name">New Prompt</div>
    <div class="shop-card-desc">Skip to a different drawing!</div>
    <div class="shop-card-cost" style="color:#9C27B0">💰 20 coins</div>`;
  skCard.onclick=buySkip;
  grid.appendChild(skCard);
}

function buyPack(pack){
  if(S.coins<pack.cost){shopMsg(`Need ${pack.cost-S.coins} more coins! 💰`);return;}
  S.coins-=pack.cost;pack.unlocked=true;sfx('buy');
  shopMsg(`${pack.icon} ${pack.name} unlocked! 🎉`);renderShop();
}
function buyHeart(){
  if(S.coins<30){shopMsg('Need 30 coins! 💰');return;}
  if(S.hearts>=S.maxHearts){shopMsg('Already at max hearts!');return;}
  S.coins-=30;S.hearts++;sfx('buy');shopMsg('❤️ +1 Heart added!');renderShop();
}
function buySkip(){
  if(S.coins<20){shopMsg('Need 20 coins! 💰');return;}
  S.coins-=20;S.prompt=pickPrompt();S.grid=mkGrid();sfx('buy');
  shopMsg(`New prompt: ${S.prompt.emoji} ${S.prompt.name}!`);renderShop();
}
function shopMsg(m){
  const el=document.getElementById('shop-msg');
  el.textContent=m;setTimeout(()=>el.textContent='',2200);
}

/* ═══════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════ */
let modalTimer=null;
function showModal(emo,title,html,isWin,canRetry,justClose,callback){
  removeModal();
  const ov=document.createElement('div');ov.className='overlay';ov.id='modal-ov';
  const box=document.createElement('div');box.className='modal';
  box.innerHTML=`
    <div class="modal-emoji">${emo}</div>
    <div class="modal-title" style="color:${isWin?'#4CAF50':'#F44336'}">${title}</div>
    <div class="modal-text">${html}</div>
    <div class="modal-btns" id="modal-btns"></div>`;
  ov.appendChild(box);document.body.appendChild(ov);
  const btns=document.getElementById('modal-btns');
  function close(){removeModal();if(callback)callback();}
  if(isWin){
    const b=document.createElement('button');b.className='btn-modal btn-modal-green';
    b.textContent='Next Drawing! 🎨';b.onclick=close;btns.appendChild(b);
    modalTimer=setTimeout(close,4000);
  } else if(canRetry){
    const b=document.createElement('button');b.className='btn-modal btn-modal-orange';
    b.textContent='Try Again! 💪';b.onclick=close;btns.appendChild(b);
  } else if(justClose){
    const b=document.createElement('button');b.className='btn-modal btn-modal-blue';
    b.textContent='Keep Drawing!';b.onclick=close;btns.appendChild(b);
  }
}
function removeModal(){
  if(modalTimer){clearTimeout(modalTimer);modalTimer=null;}
  const el=document.getElementById('modal-ov');if(el)el.remove();
}

/* ═══════════════════════════════════════════════════════════
   GAME OVER
═══════════════════════════════════════════════════════════ */
function showGameOver(){
  removeModal();
  const ov=document.createElement('div');ov.className='overlay';ov.id='modal-ov';
  ov.innerHTML=`
    <div class="modal">
      <div class="modal-emoji">💔</div>
      <div class="modal-title" style="color:#F44336">Game Over!</div>
      <div class="modal-text">You ran out of hearts!<br><b style="color:#FFD700;font-size:18px">Coins earned: ${S.coins} 💰</b></div>
      <div class="modal-btns">
        <button class="btn-modal btn-modal-orange" onclick="removeModal();startGame()">Play Again!</button>
        <button class="btn-modal btn-modal-blue" onclick="removeModal();goMenu()">Menu</button>
      </div>
    </div>`;
  document.body.appendChild(ov);
}

/* ═══════════════════════════════════════════════════════════
   EFFECTS
═══════════════════════════════════════════════════════════ */
function showConfetti(emojis){
  const stage=document.createElement('div');stage.className='confetti-stage';
  const cols=['#FF4444','#FFD700','#44FF44','#4488FF','#FF88BB','#FF8800','#CC44FF'];
  // Colored squares
  for(let i=0;i<50;i++){
    const p=document.createElement('div');p.className='confetti-piece';
    const dur=(1.4+Math.random()*1.4).toFixed(1);
    const delay=(Math.random()*.5).toFixed(2);
    p.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};
      width:${7+Math.random()*8}px;height:${7+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'3px'};
      animation-duration:${dur}s;animation-delay:${delay}s;opacity:1;`;
    stage.appendChild(p);
  }
  // Emoji bursts
  emojis.forEach((emo,i)=>{
    const e=document.createElement('div');e.className='coin-burst';
    e.textContent=emo;
    e.style.cssText=`left:${20+Math.random()*60}%;top:${30+Math.random()*30}%;font-size:${28+Math.random()*16}px;animation-delay:${i*.12}s;`;
    stage.appendChild(e);
  });
  document.body.appendChild(stage);
  setTimeout(()=>stage.remove(),3200);
}

function toast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2500);
}

/* ═══════════════════════════════════════════════════════════
   SCREEN MANAGEMENT
═══════════════════════════════════════════════════════════ */
function hideAll(){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));}

function goMenu(){hideAll();document.getElementById('menu-screen').classList.add('active');}

function startGame(){
  initAudio();startMusic();
  resetState();S.prompt=pickPrompt();
  hideAll();
  document.getElementById('game-screen').classList.add('active');
  initCanvas();renderGame();
}

/* ═══════════════════════════════════════════════════════════
   KEYBOARD
═══════════════════════════════════════════════════════════ */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    const shop=document.getElementById('shop-screen');
    if(shop.classList.contains('active')){closeShop();return;}
    goMenu();
  }
  if(e.key==='Enter'||e.key===' '){
    const game=document.getElementById('game-screen');
    if(game.classList.contains('active'))checkAccuracy();
  }
  if(e.key==='m'||e.key==='M'){
    if(musicOn){stopMusic();toast('🔇 Music muted');}
    else{initAudio();startMusic();toast('🔊 Music on');}
    return;
  }
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){
    const game=document.getElementById('game-screen');
    if(game.classList.contains('active')){e.preventDefault();undo();}
  }
});

// Handle resize
window.addEventListener('resize',()=>{
  const game=document.getElementById('game-screen');
  if(game.classList.contains('active')){
    initCanvas();renderGrid();
  }
});
